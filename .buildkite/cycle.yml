# Meta-pipeline: full Percy browser-upgrade validation cycle.
# This is the parent pipeline `percy/live-url-cycle`. It creates Percy projects,
# triggers 4 child builds on `percy/live-url-test` (2 baselines + 2 comparisons),
# and fetches per-snapshot diff reports.
#
# Required env vars on the pipeline (set in BK UI -> Settings -> Environment Variables):
#   ENCRYPTION_PASSWORD   used to decrypt configs/prod.js (which holds PERCY_USER_TOKEN)
#
# Optional overrides:
#   PROFILE               which configs/<PROFILE>.js to decrypt (default: prod)
#
# The browser-upgrade step is currently a manual BK `block:` until platform-ops
# ships an automation endpoint. Replace `block:` with a `command:` that hits the
# endpoint when it lands.

env:
  PROFILE: "prod"

steps:
  - label: ":percy: Step 1 — Create projects for this cycle"
    agents:
      os: "linux"
    commands:
      - "source ~/.nvm/nvm.sh && nvm install 20 && nvm use 20"
      - 'export CYCLE_ID="${BUILDKITE_BUILD_NUMBER}-$(date +%Y%m%d)"'
      - 'echo "CYCLE_ID=$CYCLE_ID"'
      - 'buildkite-agent meta-data set CYCLE_ID "$CYCLE_ID"'
      - |
        if [ -z "$ENCRYPTION_PASSWORD" ]; then
          echo "ERROR: ENCRYPTION_PASSWORD is not set on this pipeline."
          echo "Open pipeline Settings -> Environment Variables and add ENCRYPTION_PASSWORD."
          exit 1
        fi
      - "npm ci"
      - "npm run decrypt:config"
      - "node bin/create-projects.js"
      # Immediately re-encrypt so the decrypted form never hangs around on the agent's fs
      - "npm run encrypt:config"

  - wait

  - label: ":rocket: Step 2 — Upload dynamic baseline + comparison steps"
    agents:
      os: "linux"
    command: "bash .buildkite/generate-cycle-steps.sh | buildkite-agent pipeline upload"
