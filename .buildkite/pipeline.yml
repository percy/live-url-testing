env:
  PERCY_BRANCH: "master"

steps:
  - label: "Live URL Test :chromium:"
    agents:
      os: "linux"
    commands:
      - |
        if [ -z "$PERCY_TOKEN" ]; then
          echo "ERROR: PERCY_TOKEN is not set. Open 'New Build' -> Options -> Environment Variables and add PERCY_TOKEN=<your-percy-write-token>."
          exit 1
        fi
      - |
        if [ "$JS" != "enabled" ] && [ "$JS" != "disabled" ]; then
          echo "ERROR: JS must be 'enabled' or 'disabled' (got: '$JS')"
          echo "Open 'New Build' -> Options -> Environment Variables and add JS=enabled or JS=disabled."
          exit 1
        fi
        buildkite-agent meta-data set "js_mode" "js-$JS"
      - "rm -rf node_modules/ .percy.yml package-lock.json test-results/ playwright-report/"
      - "source ~/.nvm/nvm.sh"
      - "nvm install 20"
      - "nvm use 20"
      - "node --version"
      - 'export JS_MODE=$(buildkite-agent meta-data get js_mode); echo "=== JS_MODE: $JS_MODE ==="'
      - 'export JS_MODE=$(buildkite-agent meta-data get js_mode); cp .percy.${JS_MODE}.yml .percy.yml'
      - 'echo "=== Active config ==="; cat .percy.yml'
      - "npm ci"
      - "npx percy --version"
      - "npx playwright install --with-deps chromium"
      - "npx percy exec -- npx playwright test tests/percy_web.spec.js --reporter=dot"
