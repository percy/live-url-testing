env:
  PERCY_BRANCH: "master"

steps:
  - block: "Live URL Test Inputs"
    prompt: "Paste the Percy token and pick the JS mode for this run."
    fields:
      - text: "PERCY_TOKEN"
        key: "percy_token"
        required: true
        hint: "Percy write token of the target project."
      - select: "JS_MODE"
        key: "js_mode"
        required: true
        default: "js-disabled"
        hint: "Must match the project that owns the PERCY_TOKEN above."
        options:
          - label: "JS Enabled"
            value: "js-enabled"
          - label: "JS Disabled"
            value: "js-disabled"

  - label: "Live URL Test :chromium:"
    agents:
      os: "linux"
    commands:
      - "export PERCY_TOKEN=$(buildkite-agent meta-data get percy_token)"
      - "export JS_MODE=$(buildkite-agent meta-data get js_mode)"
      - "rm -rf node_modules/ .percy.yml package-lock.json test-results/ playwright-report/"
      - "source ~/.nvm/nvm.sh"
      - "nvm install 20"
      - "nvm use 20"
      - "node --version"
      - 'echo "=== JS_MODE: $JS_MODE ==="'
      - "cp .percy.${JS_MODE}.yml .percy.yml"
      - 'echo "=== Active config ==="; cat .percy.yml'
      - "npm ci"
      - "npx percy --version"
      - "npx playwright install --with-deps chromium"
      - "npx percy exec -- npx playwright test tests/percy_web.spec.js --reporter=dot"
