env:
  PERCY_BRANCH: "staging"

steps:
  - label: "Live URL Test :chromium:"
    agents:
      os: "linux"
    commands:
      - |
        if [ -z "$PERCY_TOKEN" ]; then
          echo "ERROR: PERCY_TOKEN is not set. Open 'New Build' -> Options -> Environment Variables and add PERCY_TOKEN=<your-percy-write-token>."
          exit 1
        fi
      - |
        if [ "$JS" != "enabled" ] && [ "$JS" != "disabled" ]; then
          echo "ERROR: JS must be 'enabled' or 'disabled' (got: '$JS')"
          echo "Open 'New Build' -> Options -> Environment Variables and add JS=enabled or JS=disabled."
          exit 1
        fi
      - "rm -rf .percy.yml test-results/ playwright-report/ .percy-run.log"
      - "source ~/.nvm/nvm.sh"
      - "nvm install 20"
      - "nvm use 20"
      - "node --version"
      - 'echo "=== JS: $JS (mode: js-$JS) ==="'
      - 'cp ".percy.js-$JS.yml" .percy.yml'
      - 'echo "=== Active config ==="; cat .percy.yml'
      - "npm ci"
      - "npx percy --version"
      - "npx playwright install --with-deps chromium"
      # Run Percy+PW and tee output so we can post-parse the Percy build ID.
      - "npx percy exec -- npx playwright test tests/percy_web.spec.js --reporter=dot 2>&1 | tee .percy-run.log"
      # Extract Percy build ID from the "Finalized build #N: https://percy.io/.../builds/<ID>" line.
      - |
        PERCY_BUILD_ID=$(grep -oE 'Finalized build #[0-9]+: https?://[^ ]+/builds/[0-9]+' .percy-run.log | tail -1 | grep -oE 'builds/[0-9]+' | cut -d/ -f2)
        if [ -n "$PERCY_BUILD_ID" ]; then
          echo "=== Percy build id: $PERCY_BUILD_ID ==="
          buildkite-agent meta-data set "PERCY_BUILD_ID_JS_${JS}" "$PERCY_BUILD_ID"
          buildkite-agent meta-data set "PERCY_BUILD_ID" "$PERCY_BUILD_ID"
        else
          echo "WARN: could not extract Percy build ID from .percy-run.log"
        fi
      # Inline per-snapshot diff listing for this run (Option B).
      # If this build has no baseline yet, the diff step returns no diffs — that's fine.
      - |
        if [ -n "$PERCY_BUILD_ID" ] && [ -f "bin/fetch-diffs.js" ]; then
          echo ""
          echo "=== Per-snapshot diffs for build $PERCY_BUILD_ID (JS=$JS) ==="
          node bin/fetch-diffs.js --build-id="$PERCY_BUILD_ID" --token="$PERCY_TOKEN" || echo "WARN: fetch-diffs exited non-zero"
        fi
