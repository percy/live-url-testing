# Consolidated pipeline: full browser-upgrade validation cycle in one BK build.
#
# Required pipeline env var (set in BK UI -> Settings -> Environment Variables):
#   ENCRYPTION_PASSWORD   decrypts configs/prod.js (holds PERCY_USER_TOKEN + team ID)
#
# Flow:
#   Step 1  decrypt config, archive stale projects, create 2 fresh projects,
#           emit write/read tokens as BK meta-data, re-encrypt config
#   Step 2  Baselines (parallel, per JS mode)
#   Step 3  Comparisons (parallel, per JS mode)
#           -- browser upgrade step is TEMPORARILY SKIPPED until platform-ops
#              ships an automation endpoint. Re-insert a `block:` step between
#              step 2 and 3 to re-enable the manual pause.
#   Step 4  Fetch per-snapshot diffs, write diff-report artifact, annotate BK

env:
  PROFILE: "prod"

steps:
  - label: ":percy: Step 1 — Prep + create projects"
    key: "setup"
    agents:
      os: "linux"
    commands:
      - "source ~/.nvm/nvm.sh && nvm install 20 && nvm use 20"
      - "bash bin/cycle-step1.sh"

  - wait

  - group: ":chromium: Step 2 — Baselines (parallel)"
    key: "baselines"
    depends_on: "setup"
    steps:
      - label: ":chromium: Baseline JS=enabled"
        agents:
          os: "linux"
        commands:
          - "source ~/.nvm/nvm.sh && nvm use 20"
          - "bash bin/run-percy-mode.sh enabled baseline"
      - label: ":chromium: Baseline JS=disabled"
        agents:
          os: "linux"
        commands:
          - "source ~/.nvm/nvm.sh && nvm use 20"
          - "bash bin/run-percy-mode.sh disabled baseline"

  - wait

  # TODO: re-insert BLOCK step here when platform-ops browser-upgrade automation lands.
  # Shape:
  #   - block: ":hand: Ops: upgrade browser version in Percy projects"
  # For now, comparisons run immediately after baselines (same browser, expect 0 diffs).

  - group: ":chromium: Step 3 — Comparisons (parallel)"
    key: "comparisons"
    depends_on: "baselines"
    steps:
      - label: ":chromium: Comparison JS=enabled"
        agents:
          os: "linux"
        commands:
          - "source ~/.nvm/nvm.sh && nvm use 20"
          - "bash bin/run-percy-mode.sh enabled comparison"
      - label: ":chromium: Comparison JS=disabled"
        agents:
          os: "linux"
        commands:
          - "source ~/.nvm/nvm.sh && nvm use 20"
          - "bash bin/run-percy-mode.sh disabled comparison"

  - wait

  - label: ":mag: Step 4 — Fetch diffs + annotate report"
    depends_on: "comparisons"
    agents:
      os: "linux"
    commands:
      - "source ~/.nvm/nvm.sh && nvm use 20"
      - "node bin/collect-cycle-report.js"
    artifact_paths:
      - "diff-report.json"
      - "diff-report.md"
