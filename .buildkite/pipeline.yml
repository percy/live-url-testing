env:
  PERCY_BRANCH: "master"

steps:
  - label: "Live URL Test :chromium:"
    agents:
      os: "linux"
    commands:
      - |
        if [ -z "$PERCY_TOKEN" ]; then
          echo "ERROR: PERCY_TOKEN is not set. Open 'New Build' -> Options -> Environment Variables and add PERCY_TOKEN=<your-percy-write-token>."
          exit 1
        fi
      - |
        if [ "$JS_MODE" != "js-enabled" ] && [ "$JS_MODE" != "js-disabled" ]; then
          echo "ERROR: JS_MODE must be 'js-enabled' or 'js-disabled', got: '$JS_MODE'"
          echo "Open 'New Build' -> Options -> Environment Variables and add JS_MODE=js-enabled or JS_MODE=js-disabled."
          exit 1
        fi
      - "rm -rf node_modules/ .percy.yml package-lock.json test-results/ playwright-report/"
      - "source ~/.nvm/nvm.sh"
      - "nvm install 20"
      - "nvm use 20"
      - "node --version"
      - 'echo "=== JS_MODE: $JS_MODE ==="'
      - "cp .percy.${JS_MODE}.yml .percy.yml"
      - 'echo "=== Active config ==="; cat .percy.yml'
      - "npm ci"
      - "npx percy --version"
      - "npx playwright install --with-deps chromium"
      - "npx percy exec -- npx playwright test tests/percy_web.spec.js --reporter=dot"
